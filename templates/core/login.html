{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5 mb-5 align-items-center">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
            <div class="card-header bg-dark text-white text-center py-4 border-0">
                <i class="fas fa-brain fa-3x text-primary mb-2"></i>
                <h3 class="fw-bolder mb-0">HR Portal Login</h3>
                <small class="opacity-75">Access the AI Resume ATS</small>
            </div>
            
            <div class="card-body p-5 bg-white">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-4">
                        <label class="form-label fw-bold text-dark">Username <span class="text-danger">*</span></label>
                        <div class="input-group shadow-sm">
                            <span class="input-group-text bg-light border-0"><i class="fas fa-user text-muted"></i></span>
                            <input type="text" name="username" class="form-control form-control-lg border-0 bg-light" placeholder="Enter your username" required autofocus>
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-bold text-dark">Password <span class="text-danger">*</span></label>
                        <div class="input-group shadow-sm">
                            <span class="input-group-text bg-light border-0"><i class="fas fa-lock text-muted"></i></span>
                            <input type="password" name="password" class="form-control form-control-lg border-0 bg-light" placeholder="Enter your password" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 shadow rounded-pill fw-bold mt-2">
                        <i class="fas fa-sign-in-alt me-2"></i>Secure Login
                    </button>
                    
                    <input type="hidden" name="next" value="{{ next }}">
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
