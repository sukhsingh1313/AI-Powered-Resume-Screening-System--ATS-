{% extends 'base.html' %}

{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    /* Custom CSS for Drag & Drop Area */
    .drop-zone {
        max-width: 100%;
        height: 250px;
        padding: 25px;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-family: "Quicksand", sans-serif;
        font-weight: 500;
        font-size: 20px;
        cursor: pointer;
        color: #cccccc;
        border: 3px dashed #4f46e5;
        border-radius: 15px;
        background-color: #f8f9fa;
        transition: all 0.3s ease;
    }

    .drop-zone:hover, .drop-zone--over {
        background-color: #eef2ff;
        border-color: #3730a3;
        color: #3730a3;
        transform: scale(1.02);
    }

    .drop-zone__input {
        display: none;
    }

    .drop-zone__thumb {
        width: 100%;
        height: 100%;
        border-radius: 10px;
        overflow: hidden;
        background-color: #cccccc;
        background-size: cover;
        position: relative;
    }
</style>

<div class="row justify-content-center mt-5 mb-5">
    <div class="col-md-8">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-header bg-dark text-white rounded-top-4 py-3">
                <h3 class="mb-0 text-center"><i class="fas fa-paper-plane me-2 text-primary"></i>Apply for: {{ job.title }}</h3>
            </div>
            
            <div class="card-body bg-white p-4 p-md-5">
                <div class="alert alert-info border-0 shadow-sm rounded-3 mb-4">
                    <strong><i class="fas fa-lightbulb text-warning me-2"></i>Required Skills:</strong> {{ job.required_skills }}
                </div>
                
                <form method="POST" enctype="multipart/form-data">
                    {% csrf_token %}
                    
                    <div class="row mb-4">
                        <div class="col-md-6 mb-3 mb-md-0">
                            <label class="form-label fw-bold text-dark">Full Name <span class="text-danger">*</span></label>
                            <input type="text" name="full_name" class="form-control form-control-lg bg-light border-0 shadow-sm" placeholder="e.g. Arshdeep kaur" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-bold text-dark">Email Address <span class="text-danger">*</span></label>
                            <input type="email" name="email" class="form-control form-control-lg bg-light border-0 shadow-sm" placeholder="hello@example.com" required>
                        </div>
                    </div>
                    
                    <div class="mb-5 mt-4">
                        <label class="form-label fw-bold fs-5 mb-3 text-dark">Upload Your Resume (PDF only) <span class="text-danger">*</span></label>
                        
                        <div class="drop-zone shadow-sm" id="drop-zone">
                            <span class="drop-zone__prompt">
                                <i class="fas fa-cloud-upload-alt fs-1 text-primary mb-3 d-block"></i>
                                Drag and drop your PDF here or <span class="text-primary fw-bold text-decoration-underline">Click to browse</span>
                            </span>
                            <input type="file" name="resume_file" id="resume" class="drop-zone__input" accept=".pdf" required>
                        </div>
                        
                        <div class="form-text text-success mt-3 text-center fw-bold">
                            <i class="fas fa-robot me-1"></i> Our AI will instantly parse your resume and calculate your Match Score.
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-100 shadow rounded-pill fw-bold" id="submit-btn">
                        <i class="fas fa-rocket me-2"></i>Submit Application & Analyze
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    document.querySelectorAll(".drop-zone__input").forEach((inputElement) => {
        const dropZoneElement = inputElement.closest(".drop-zone");
        const promptElement = dropZoneElement.querySelector(".drop-zone__prompt");

        dropZoneElement.addEventListener("click", (e) => {
            inputElement.click();
        });

        inputElement.addEventListener("change", (e) => {
            if (inputElement.files.length) {
                updateThumbnail(dropZoneElement, inputElement.files[0], promptElement);
            }
        });

        dropZoneElement.addEventListener("dragover", (e) => {
            e.preventDefault();
            dropZoneElement.classList.add("drop-zone--over");
        });

        ["dragleave", "dragend"].forEach((type) => {
            dropZoneElement.addEventListener(type, (e) => {
                dropZoneElement.classList.remove("drop-zone--over");
            });
        });

        dropZoneElement.addEventListener("drop", (e) => {
            e.preventDefault();
            if (e.dataTransfer.files.length) {
                inputElement.files = e.dataTransfer.files;
                updateThumbnail(dropZoneElement, e.dataTransfer.files[0], promptElement);
            }
            dropZoneElement.classList.remove("drop-zone--over");
        });
    });

    function updateThumbnail(dropZoneElement, file, promptElement) {
        // Change text to file name to show success
        promptElement.innerHTML = `<i class="fas fa-file-pdf fs-1 text-danger mb-3 d-block"></i> <span class="text-dark fw-bold">${file.name}</span> <br> <small class="text-success">Ready to submit!</small>`;
        dropZoneElement.style.borderColor = "#10b981"; // Change border to green
        dropZoneElement.style.backgroundColor = "#ecfdf5";
    }
</script>
{% endblock %}
